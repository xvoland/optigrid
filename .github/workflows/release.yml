name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: optigrid
  SRC: main.go
  BUILD_DIR: build
  LDFLAGS: "-s -w"
  WIN_LDFLAGS: "-s -w -H windowsgui"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: optigrid_windows_amd64.exe
            ldflags: ${{ env.WIN_LDFLAGS }}
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: optigrid_linux_amd64
            ldflags: ${{ env.LDFLAGS }}
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: optigrid_macos_amd64
            ldflags: ${{ env.LDFLAGS }}
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: optigrid_macos_arm64
            ldflags: ${{ env.LDFLAGS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=1 \
            go build -ldflags="${{ matrix.ldflags }}" \
            -o ${{ env.BUILD_DIR }}/${{ matrix.artifact }} \
            ${{ env.SRC }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.BUILD_DIR }}/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/optigrid_windows_amd64.exe
            artifacts/optigrid_linux_amd64
            artifacts/optigrid_macos_amd64
            artifacts/optigrid_macos_arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
