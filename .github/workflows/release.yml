name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: optigrid
  SRC: main.go
  BUILD_DIR: build
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  GITHUB_OUTPUT: ''

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: optigrid_windows_amd64.exe
            ldflags: "-s -w -H windowsgui"
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: optigrid_linux_amd64
            ldflags: "-s -w"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: optigrid_macos_amd64
            ldflags: "-s -w"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: optigrid_macos_arm64
            ldflags: "-s -w"
        exclude:
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libxss-dev \
            libxcursor-dev \
            libxxf86vm-dev

      - name: Create build directory
        run: mkdir -p ${{ env.BUILD_DIR }}

      - name: Fix gtar on Apple Silicon
        if: matrix.os == 'macos-latest'
        run: |
          sudo rm -f /opt/homebrew/bin/gtar 2>/dev/null || true
          sudo ln -sf /usr/bin/tar /opt/homebrew/bin/gtar 2>/dev/null || true

      - name: Build
        run: go build -ldflags="${{ matrix.ldflags }}" -o ${{ env.BUILD_DIR }}/${{ matrix.artifact }} ${{ env.SRC }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.BUILD_DIR }}/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/optigrid_windows_amd64.exe
            artifacts/optigrid_linux_amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
