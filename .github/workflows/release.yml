name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  APP_NAME: optigrid
  SRC: main.go
  BUILD_DIR: build
  GO_VERSION: '1.22'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: optigrid_windows_amd64.exe
            ldflags: "-s -w -H windowsgui"
          - os: ubuntu-latest
            artifact: optigrid_linux_amd64
            ldflags: "-s -w"
          - os: macos-latest
            artifact: optigrid_macos_amd64
            ldflags: "-s -w"
          - os: macos-14
            artifact: optigrid_macos_arm64
            ldflags: "-s -w"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxi-dev libgl1-mesa-dev libasound2-dev libxss-dev libxxf86vm-dev

      - name: Build
        env:
          GOOS: ${{ matrix.os == 'windows-latest' && 'windows' || matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}
          GOARCH: ${{ matrix.os == 'macos-14' && 'arm64' || 'amd64' }}
          CGO_ENABLED: '1'
        run: |
          mkdir -p ${{ env.BUILD_DIR }}
          go build -ldflags="${{ matrix.ldflags }}" -o ${{ env.BUILD_DIR }}/${{ matrix.artifact }} ${{ env.SRC }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          overwrite: true
          generate_release_notes: false
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: ${{ env.BUILD_DIR }}/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
